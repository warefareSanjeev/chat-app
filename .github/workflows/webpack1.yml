name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Using stable LTS releases of Node.js
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install and Bundle with Webpack
      run: |
        npm ci
        npx webpack

    # Optional: Save the compiled build files so the deploy job can use them
    - name: Upload Production Workspace
      uses: actions/upload-artifact@v4
      with:
        name: production-assets-${{ matrix.node-version }}
        path: dist/ # Adjust this to match your Webpack output folder (usually 'dist' or 'build')

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download the compiled files from the build matrix (Example uses Node 22 output)
      - name: Download Compiled Assets
        uses: actions/download-artifact@v4
        with:
          name: production-assets-22.x
          path: dist/

      - name: Deploy
        run: echo "Deploying assets to production server..."
